name: Release
on: workflow_dispatch

jobs:
  build:
    uses: lynx-family/internal-preact/.github/workflows/build-test.yml@v10.x

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.build-version.outputs.full_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Get package version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Get commit hash
        id: commit-hash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
      - name: Build package version
        id: build-version
        run: |
          FULL_VERSION="${{ steps.package-version.outputs.version }}-${{ steps.commit-hash.outputs.sha }}"
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          name: npm-package
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v6
        with:
          script: |
            const script = require('./scripts/release/create-gh-release.js')
            return script({ github, context, tagName: '${{ steps.build-version.outputs.full_version }}' })
      - name: Upload release artifact
        uses: actions/github-script@v6
        with:
          script: |
            const script = require('./scripts/release/upload-gh-asset.js')
            return script({ require, github, context, glob, release: ${{ steps.create-release.outputs.result }} })

  publish:
    uses: ./.github/workflows/publish.yml
    needs: release
    secrets: inherit
    with:
      release: ${{ needs.release.outputs.tag_name }}
